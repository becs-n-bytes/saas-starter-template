# A string used to distinguish different Supabase projects on the same host. Defaults to the
# temporary directory from the operating system.
project_id = "my-saas"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints. `public` is always included.
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# The database major version to use. This has to be the same as your remote database's. Run `SHOW
# server_version;` on the remote database to check.
major_version = 15

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323

[auth]
enabled = true
# The base URL of your website. Used for email confirmation links, etc.
site_url = "http://127.0.0.1:3000"
# Allowed redirect URLs after authentication.
additional_redirect_urls = ["http://127.0.0.1:3000"]

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# Require email confirmation before allowing sign-in.
double_confirm_changes = true
# Enable email confirmations via link (set to false for OTP-based confirmation).
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[auth.external.github]
enabled = false
client_id = ""
secret = ""
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
